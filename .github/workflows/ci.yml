name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: radar
          POSTGRES_USER: radar
          POSTGRES_PASSWORD: radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radar -d radar"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://radar:radar@localhost:5432/radar
      RUN_DATABASE_TESTS: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install -e './backend[dev]'
      - run: cd backend && alembic upgrade head
      - run: make PYTHON=python backend-lint
      - run: make PYTHON=python backend-test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: make frontend-lint
      - run: make frontend-test frontend-build

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - run: make e2e
